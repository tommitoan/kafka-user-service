syntax = "proto3";

// !! WARNING: proto/user_event.pb.go is hand-written and NOT generated by protoc. !!
// !! If you run `make proto-gen`, you MUST manually re-add the EventId field       !!
// !! (field 7, json_name "event_id") and the DO NOT REGENERATE header to           !!
// !! proto/user_event.pb.go afterwards. Skipping this breaks idempotency.          !!

package com.example.user;

option go_package = "github.com/example/user-kafka-go/proto";

import "google/protobuf/timestamp.proto";

enum EventType {
  CREATED = 0;
  UPDATED = 1;
  DELETED = 2;
}

message UserEvent {
  EventType event_type = 1;
  string user_id       = 2;
  string name          = 3;
  string email         = 4;
  int32  age           = 5;
  google.protobuf.Timestamp timestamp = 6;
  string event_id      = 7;
}
