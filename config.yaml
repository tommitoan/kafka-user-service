server:
  host: "0.0.0.0"
  port: 8085

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  name: "userdb"
  sslmode: "disable"

kafka:
  brokers:
    - "localhost:9092"
  group_id: "user-service"
  schema_registry: "http://localhost:8081"
  # ── Topic registry ────────────────────────────────────────────────────────
  # Add new topics here. EnsureTopics() will create them automatically on
  # startup — no manual kafka-topics.sh or Kafka UI clicks needed.
  topics:
    - name: "com.br4.user.core.event.avro"
      num_partitions: 3
      replication_factor: 1
    - name: "com.br4.user.core.event.proto"
      num_partitions: 3
      replication_factor: 1
    # Example: adding a new topic is just adding an entry here
    # - name: "com.br4.order.core.event.avro"
    #   num_partitions: 3
    #   replication_factor: 1
